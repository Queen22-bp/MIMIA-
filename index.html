<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat - MiMia</title>

<!-- Firebase (compat pour simplifier) -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 0;
}

#messages {
  height: 70vh;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  padding: 8px;
  margin: 5px;
  border-radius: 10px;
  max-width: 70%;
}

.me {
  background: #dcf8c6;
  margin-left: auto;
}

.other {
  background: #eee;
}

#inputBox {
  display: flex;
  padding: 10px;
}

#msgInput {
  flex: 1;
  padding: 10px;
}
</style>

</head>

<body>

<button onclick="logout()">🚪 Déconnexion</button>

<h2 style="text-align:center;">💬 Chat MiMia</h2>

<div id="messages"></div>

<div id="inputBox">
  <input id="msgInput" placeholder="Écrire un message...">
  <button onclick="sendMessage()">Envoyer</button>
</div>

<script>

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

/* 🔐 AUTH PROTECTION */
auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    setOnline(user.uid);
  }
});

/* 🟢 ONLINE STATUS */
function setOnline(uid) {
  db.collection("users").doc(uid).set({
    status: "online",
    lastSeen: Date.now()
  }, { merge: true });
}

/* 💬 ENVOYER MESSAGE */
function sendMessage() {
  const msg = msgInput.value;
  if (!msg) return;

  const user = auth.currentUser;

  db.collection("messages").add({
    text: msg,
    user: user.email,
    uid: user.uid,
    status: "sent",
    time: Date.now()
  });

  msgInput.value = "";
}

/* 📥 AFFICHER MESSAGES */
db.collection("messages")
.orderBy("time")
.onSnapshot(snapshot => {

  let html = "";

  snapshot.forEach(doc => {
    const d = doc.data();
    const currentUser = auth.currentUser;

    let isMe = currentUser && d.uid === currentUser.uid;

    html += `
      <div class="msg ${isMe ? 'me' : 'other'}">
        <b>${d.user}</b><br>
        ${d.text}
        <span style="float:right;">
          ${d.status === "read" ? "✔✔" : "✔"}
        </span>
      </div>
    `;
  });

  messages.innerHTML = html;

  messages.scrollTop = messages.scrollHeight;
});

/* ✔✔ MARQUER COMME LU */
db.collection("messages")
.onSnapshot(snapshot => {
  snapshot.forEach(doc => {
    const d = doc.data();

    if (auth.currentUser && d.uid !== auth.currentUser.uid) {
      doc.ref.update({ status: "read" });
    }
  });
});

/* 🚪 LOGOUT */
function logout() {
  auth.signOut().then(() => {
    window.location.href = "login.html";
  });
}

</script>

<br><br>

<div style="text-align:center;">
  <a href="media.html">🎵 Média</a> |
  <a href="calls.html">📞 Appels</a>
</div>

</body>
</html>
