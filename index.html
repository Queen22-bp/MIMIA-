<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MiMia 💬</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
body {
  font-family: Arial;
  background: #e5ddd5;
  text-align: center;
}

input, button {
  padding: 10px;
  margin: 5px;
  width: 90%;
  max-width: 400px;
}

button {
  background: #075e54;
  color: white;
  border: none;
  border-radius: 5px;
}

#chat {
  max-width: 500px;
  margin: auto;
  text-align: left;
}

.msg {
  background: white;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
}

.me {
  background: #dcf8c6;
  margin-left: auto;
}

img {
  max-width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<h2>MiMia 💬</h2>

<input id="email" type="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Mot de passe"><br>

<button onclick="register()">Créer compte</button>
<button onclick="login()">Se connecter</button>
<button onclick="logout()">Déconnexion</button>

<p id="status"></p>

<hr>

<input id="message" placeholder="Ton message"><br>
<input type="file" id="file"><br>

<button onclick="sendMessage()">Envoyer</button>

<hr>

<input id="privateEmail" placeholder="Email ami"><br>
<button onclick="sendPrivate()">Message privé</button>

<div id="chat"></div>

<script>
/* 🔥 CONFIG FIREBASE */
firebase.initializeApp({
  apiKey: "AIzaSyCsTZdce8EnHNc3za9BX6AJnfTOCqcCQf0",
  authDomain: "mi-mia.firebaseapp.com",
  projectId: "mi-mia",
  storageBucket: "mi-mia.firebasestorage.app",
  messagingSenderId: "871745901536",
  appId: "1:871745901536:web:cc3e037b967094942ed185"
});

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let user = null;

/* 🔐 AUTH */
auth.onAuthStateChanged(u => {
  user = u;

  if (u) {
    status.innerText = "Connecté : " + u.email;
    loadMessages();
  }
});

/* 🔑 REGISTER */
function register() {
  auth.createUserWithEmailAndPassword(email.value, password.value)
  .catch(e => alert(e.message));
}

/* 🔑 LOGIN */
function login() {
  auth.signInWithEmailAndPassword(email.value, password.value)
  .catch(e => alert(e.message));
}

/* 🚪 LOGOUT */
function logout() {
  auth.signOut();
}

/* 🔐 ENCRYPTION SIMPLE */
function encrypt(t) {
  return btoa(t);
}

function decrypt(t) {
  return atob(t);
}

/* 💬 ENVOI MESSAGE */
function sendMessage() {
  if (!user) return;

  let text = encrypt(message.value);
  let file = document.getElementById("file").files[0];

  if (!text && !file) return;

  if (file) {
    let ref = storage.ref("images/" + file.name);

    ref.put(file).then(s => {
      s.ref.getDownloadURL().then(url => {
        db.collection("messages").add({
          text,
          image: url,
          email: user.email,
          date: Date.now(),
          likes: []
        });
      });
    });
  } else {
    db.collection("messages").add({
      text,
      email: user.email,
      date: Date.now(),
      likes: []
    });
  }

  message.value = "";
}

/* 📥 CHARGEMENT */
function loadMessages() {
  db.collection("messages")
  .orderBy("date", "desc")
  .limit(20)
  .onSnapshot(snapshot => {

    let html = "";

    snapshot.forEach(doc => {
      let d = doc.data();
      let me = user && d.email === user.email;

      let text = "";

      try {
        text = decrypt(d.text);
      } catch {
        text = d.text;
      }

      html += `<div class="msg ${me ? "me" : ""}">
        <b>${d.email}</b><br><br>
        ${text}<br><br>`;

      if (d.image) {
        html += `<img src="${d.image}"><br>`;
      }

      html += `
        ❤️ ${(d.likes || []).length}<br>
        <button onclick="like('${doc.id}')">Like</button>
      </div>`;
    });

    chat.innerHTML = html;
  });
}

/* ❤️ LIKE */
function like(id) {
  db.collection("messages").doc(id).update({
    likes: firebase.firestore.FieldValue.arrayUnion(user.email)
  });
}

/* 💌 MESSAGE PRIVÉ */
function sendPrivate() {
  if (!user) return;

  db.collection("privateMessages").add({
    from: user.email,
    to: privateEmail.value,
    text: encrypt(message.value),
    date: Date.now()
  });

  message.value = "";
}
</script>

</body>
  </html>
