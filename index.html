<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MiMia</title>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b141a;
  color: white;
}

.nav {
  display: flex;
  justify-content: space-around;
  background: #075e54;
  padding: 10px;
}

button {
  background: #128c7e;
  border: none;
  color: white;
  padding: 10px;
  border-radius: 5px;
}

.page {
  display: none;
  padding: 10px;
}

.active {
  display: block;
}

.msg {
  background: #1f2c34;
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
}
</style>

</head>

<body>

<!-- NAV -->
<div class="nav">
  <button onclick="showPage('chat')">💬 Chat</button>
  <button onclick="showPage('media')">🎵 Média</button>
  <button onclick="showPage('calls')">📞 Appels</button>
</div>

<!-- CHAT -->
<div id="chat" class="page active">

  <div id="messages"></div>

  <input id="msgInput" placeholder="Message...">
  <button onclick="sendMessage()">Envoyer</button>

</div>

<!-- MEDIA -->
<div id="media" class="page">

  <input type="file" id="fileInput">
  <button onclick="uploadMedia()">Upload</button>

  <div id="mediaList"></div>

</div>

<!-- CALLS -->
<div id="calls" class="page">

  <h3>📞 Appels (base)</h3>

  <button onclick="startCall()">Appeler</button>

  <p id="callStatus"></p>

</div>

<script>
/* 🔥 FIREBASE CONFIG (REMPLACE ICI) */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

/* 🔁 NAVIGATION */
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('active');
  });

  document.getElementById(pageId).classList.add('active');
}

/* 💬 CHAT */
function sendMessage() {
  let msg = document.getElementById("msgInput").value;
  if (msg === "") return;

  db.collection("messages").add({
    text: msg,
    time: Date.now()
  });

  document.getElementById("msgInput").value = "";
}

db.collection("messages")
.orderBy("time")
.onSnapshot(snapshot => {

  let html = "";

  snapshot.forEach(doc => {
    let data = doc.data();

    html += `
      <div class="msg">
        ${data.text}
        <span style="float:right;">✔✔</span>
      </div>
    `;
  });

  document.getElementById("messages").innerHTML = html;
});

/* 🎵 MEDIA */
function uploadMedia() {
  let file = document.getElementById("fileInput").files[0];

  if (!file) return;

  let ref = storage.ref("media/" + file.name);

  ref.put(file).then(() => {
    ref.getDownloadURL().then(url => {

      db.collection("media").add({
        url: url,
        time: Date.now()
      });

    });
  });
}

db.collection("media")
.onSnapshot(snapshot => {

  let html = "";

  snapshot.forEach(doc => {
    let data = doc.data();

    html += `
      <div style="margin:10px;">
        <video src="${data.url}" controls width="100%"></video>
      </div>
    `;
  });

  document.getElementById("mediaList").innerHTML = html;
});

/* 📞 APPELS (BASIQUE) */
function startCall() {
  document.getElementById("callStatus").innerText = "Appel en cours...";
}
</script>

</body>
</html>
