<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Appels - MiMia</title>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

</head>

<body>

<h2>📞 Appels</h2>

<button onclick="startCall()">📹 Démarrer appel</button>

<video id="localVideo" autoplay playsinline width="200"></video>
<video id="remoteVideo" autoplay playsinline width="200"></video>

<script>

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let pc;

/* 🔐 AUTH */
auth.onAuthStateChanged(user => {
  if (!user) window.location.href = "login.html";
});

/* 📞 APPEL */
async function startCall() {

  pc = new RTCPeerConnection({
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
  });

  const stream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  localVideo.srcObject = stream;

  stream.getTracks().forEach(track => pc.addTrack(track, stream));

  pc.ontrack = event => {
    remoteVideo.srcObject = event.streams[0];
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  db.collection("calls").add({
    offer: offer,
    createdAt: Date.now()
  });

}

</script>

<br>
<a href="chat.html">💬 Chat</a>

</body>
</html>
