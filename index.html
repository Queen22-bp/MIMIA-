<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MiMia</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}
input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
}
button {
  background: #38bdf8;
}#42445A
.hidden {
  display: none;
}
.post {
  background: #1e293b;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}
</style>

</head>
<body>

<h1>🔥 MiMia</h1>

<!-- LOGIN -->
<div id="login">
  <h2>Connexion</h2>
  <input id="username" placeholder="Nom d'utilisateur"><br>
  <button onclick="login()">Entrer</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <h2 id="welcome"></h2>

  <input id="message" placeholder="Écris quelque chose..."><br>
  <button onclick="poster()">Publier</button>

  <div id="feed"></div>

</div>

<script>

let user = "";

function login() {
  user = document.getElementById("username").value;
  if (user === "") return;

  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  document.getElementById("welcome").innerText = "Bienvenue " + user;
}

function poster() {
  let msg = document.getElementById("message").value;
  if (msg === "") return;

  let post = document.createElement("div");
  post.className = "post";
  post.innerText = user + " : " + msg;

  document.getElementById("feed").prepend(post);
}

</script>

</body>
</html>
