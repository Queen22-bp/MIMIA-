<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MiMia - Fusion</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: white;
}

/* HEADER */
.header {
  padding: 15px;
  background: #1f1f1f;
  font-weight: bold;
}

/* NAVIGATION */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: #1f1f1f;
}

.nav button {
  flex: 1;
  padding: 15px;
  background: none;
  border: none;
  color: white;
}

/* PAGES */
.page {
  display: none;
  padding: 10px;
}

.active {
  display: block;
}

/* CHAT */
.chat {
  display: flex;
  flex-direction: column;
}

.msg {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  max-width: 70%;
}

.me {
  background: #25d366;
  align-self: flex-end;
}

.other {
  background: #333;
  align-self: flex-start;
}

/* MUSIC */
.song {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  cursor: pointer;
}

.song:hover {
  background: #1f1f1f;
}

.song img {
  width: 50px;
  height: 50px;
  border-radius: 5px;
}

/* PLAYER */
.player {
  position: fixed;
  bottom: 60px;
  width: 100%;
  background: #181818;
  padding: 10px;
}

</style>

</head>

<body>

<div class="header">MiMia</div>

<!-- CHAT -->
<div id="chat" class="page active chat">
  <div id="messages"></div>
  <input id="msgInput" placeholder="Message...">
  <button onclick="sendMessage()">Envoyer</button>
</div>

<!-- MUSIC -->
<div id="music" class="page">
  <h3>🎵 Musique</h3>
  <div id="songs"></div>
</div>

<!-- PLAYER -->
<div class="player">
  <div id="now">🎵 Rien</div>
  <audio id="audio" controls style="width:100%"></audio>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="showPage('chat')">💬</button>
  <button onclick="showPage('music')">🎵</button>
</div>

<script>

/* NAVIGATION */
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

/* CHAT (DEMO LOCAL) */
function sendMessage() {
  const msg = msgInput.value;
  if (!msg) return;

  messages.innerHTML += `<div class="msg me">${msg}</div>`;
  msgInput.value = "";
}

/* MUSIQUE */
const songs = [
  { name: "Song 1", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
  { name: "Song 2", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" }
];

const songsDiv = document.getElementById("songs");
const audio = document.getElementById("audio");
const now = document.getElementById("now");

songs.forEach((s, i) => {
  songsDiv.innerHTML += `
    <div class="song" onclick="playSong(${i})">
      🎵 ${s.name}
    </div>
  `;
});

function playSong(i) {
  audio.src = songs[i].url;
  audio.play();
  now.innerText = "🎵 " + songs[i].name;
}

</script>

</body>
  </html>
