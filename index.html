<!DOCTYPE html><html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>MiMia Firebase</title>  <!-- Firebase CDN --><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>  <br><br>
<input type="password" id="password" placeholder="Mot de passe"><br><br>

<button onclick="register()">Créer compte</button>
<button onclick="login()">Se connecter</button>

<p id="msg"></p><script>
  // 👉 TON CONFIG (adapté)
  const firebaseConfig = {
    apiKey: "AIzaSyCsTZdce8EnHNc3za9BX6AJnfTOCqcCQf0",
    authDomain: "mi-mia.firebaseapp.com",
    projectId: "mi-mia",
    storageBucket: "mi-mia.firebasestorage.app",
    messagingSenderId: "871745901536",
    appId: "1:871745901536:web:cc3e037b967094942ed185"
  };

  // Initialisation
  const app = firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  function register() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, password)
      .then(() => {
        document.getElementById("msg").innerText = "Compte créé ✅";
      })
      .catch(e => {
        document.getElementById("msg").innerText = e.message;
      });
  }

  function login() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
      .then(() => {
        document.getElementById("msg").innerText = "Connecté ✅";
      })
      .catch(e => {
        document.getElementById("msg").innerText = e.message;
      });
  }
</script></body>
</html>
