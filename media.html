<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Média</title>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>

</head>

<body>

<h2>🎵 Média</h2>

<input type="file" id="fileInput">
<button onclick="upload()">Upload</button>

<div id="mediaList"></div>

<script>

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_BUCKET"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();
const auth = firebase.auth();

auth.onAuthStateChanged(user => {
  if (!user) window.location.href = "login.html";
});

function upload() {
  let file = fileInput.files[0];
  if (!file) return;

  let ref = storage.ref("media/" + file.name);

  ref.put(file).then(() => {
    ref.getDownloadURL().then(url => {

      db.collection("media").add({
        url: url
      });

    });
  });
}

db.collection("media").onSnapshot(snapshot => {

  let html = "";

  snapshot.forEach(doc => {
    html += `<video src="${doc.data().url}" controls width="100%"></video>`;
  });

  mediaList.innerHTML = html;
});

</script>

</body>
</html>
