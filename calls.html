<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Appels</title>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

</head>

<body>

<h2>📞 Appels</h2>

<video id="localVideo" autoplay muted width="150"></video>
<video id="remoteVideo" autoplay width="150"></video>

<br>

<button onclick="startCall()">Appeler</button>
<button onclick="answerCall()">Répondre</button>

<script>

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

let pc;
let stream;

const servers = {
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

async function startCall() {

  pc = new RTCPeerConnection(servers);

  stream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  localVideo.srcObject = stream;

  stream.getTracks().forEach(t => pc.addTrack(t, stream));

  pc.ontrack = e => remoteVideo.srcObject = e.streams[0];

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  db.collection("calls").doc("call1").set({ offer });

}

async function answerCall() {

  pc = new RTCPeerConnection(servers);

  stream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  localVideo.srcObject = stream;

  stream.getTracks().forEach(t => pc.addTrack(t, stream));

  pc.ontrack = e => remoteVideo.srcObject = e.streams[0];

  const doc = await db.collection("calls").doc("call1").get();

  await pc.setRemoteDescription(new RTCSessionDescription(doc.data().offer));

  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  db.collection("calls").doc("call1").update({ answer });

}

</script>

</body>
</html>
