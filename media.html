<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Média - MiMia</title>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

</head>

<body>

<h2>🎵 Média</h2>

<input type="file" id="fileInput"><br><br>
<button onclick="upload()">Uploader</button>

<div id="list"></div>

<script>

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_BUCKET"
};

firebase.initializeApp(firebaseConfig);

const storage = firebase.storage();
const auth = firebase.auth();

/* 🔐 PROTECTION */
auth.onAuthStateChanged(user => {
  if (!user) window.location.href = "login.html";
});

/* ⬆️ UPLOAD */
function upload() {
  const file = fileInput.files[0];
  if (!file) return;

  const ref = storage.ref("media/" + file.name);

  ref.put(file).then(() => {
    alert("Upload réussi !");
    loadFiles();
  });
}

/* 📥 CHARGER FICHIERS */
function loadFiles() {
  const ref = storage.ref("media");

  ref.listAll().then(res => {
    list.innerHTML = "";

    res.items.forEach(item => {
      item.getDownloadURL().then(url => {

        list.innerHTML += `
          <div>
            <a href="${url}" target="_blank">${item.name}</a><br>
            <audio controls src="${url}"></audio><br>
            <video controls width="200" src="${url}"></video>
            <hr>
          </div>
        `;
      });
    });
  });
}

loadFiles();

</script>

<br>
<a href="chat.html">💬 Chat</a>

</body>
</html>
