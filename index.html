<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat</title>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

<style>
.msg { padding:10px; margin:5px; border-radius:10px; }
.me { background:#25d366; text-align:right; }
.other { background:#333; }
</style>

</head>

<body>

<button onclick="logout()">Logout</button>

<h2>Chat</h2>

<div id="messages"></div>

<input id="msgInput">
<button onclick="send()">Send</button>

<script>

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

/* AUTH */
auth.onAuthStateChanged(user => {
  if (!user) window.location.href = "login.html";
});

/* SEND */
function send() {
  const user = auth.currentUser;

  db.collection("messages").add({
    text: msgInput.value,
    uid: user.uid,
    user: user.email,
    status: "sent",
    time: Date.now()
  });

  msgInput.value = "";
}

/* LOAD */
db.collection("messages")
.orderBy("time")
.onSnapshot(snapshot => {

  messages.innerHTML = "";

  snapshot.forEach(doc => {
    const d = doc.data();
    const isMe = auth.currentUser.uid === d.uid;

    messages.innerHTML += `
      <div class="msg ${isMe ? 'me' : 'other'}">
        ${d.text}
        <br>
        ${d.status === "read" ? "✔✔" : "✔"}
      </div>
    `;
  });

});

/* READ */
db.collection("messages").onSnapshot(snapshot => {
  snapshot.forEach(doc => {
    const d = doc.data();
    if (auth.currentUser && d.uid !== auth.currentUser.uid) {
      doc.ref.update({ status: "read" });
    }
  });
});

/* LOGOUT */
function logout() {
  auth.signOut().then(() => {
    window.location.href = "login.html";
  });
}

</script>

<br>
<a href="media.html">🎵 Music</a>

</body>
</html>
