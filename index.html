<!DOCTYPE html><html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>MiMia Firebase</title>  <!-- Firebase CDN -->  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script></head><body><h2>MiMia 🔐 Firebase</h2><!-- Champs --><input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Mot de passe"><br><br>

<!-- Boutons --><button onclick="register()">Créer compte</button>
<button onclick="login()">Se connecter</button>

<!-- Message --><p id="msg"></p><script>
  // Configuration Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyCsTZdce8EnHNc3za9BX6AJnfTOCqcCQf0",
    authDomain: "mi-mia.firebaseapp.com",
    projectId: "mi-mia",
    storageBucket: "mi-mia.firebasestorage.app",
    messagingSenderId: "871745901536",
    appId: "1:871745901536:web:cc3e037b967094942ed185"
  };

  // Initialisation Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // Créer compte
  function register() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, password)
      .then(() => {
        document.getElementById("msg").innerText = "Compte créé ✅";
      })
      .catch(error => {
        document.getElementById("msg").innerText = error.message;
      });
  }

  // Connexion
  function login() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
      .then(() => {
        document.getElementById("msg").innerText = "Connecté ✅";
      })
      .catch(error => {
        document.getElementById("msg").innerText = error.message;
      });
  }
</script></body>
</html>
