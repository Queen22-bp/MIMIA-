<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>MiMia Firebase</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>

  <h2>MiMia 🔐 Firebase</h2>

  <!-- Connexion -->
  <input type="email" id="email" placeholder="Email"><br><br>
  <input type="password" id="password" placeholder="Mot de passe"><br><br>

  <button onclick="register()">Créer compte</button>
  <button onclick="login()">Se connecter</button>

  <p id="msg"></p>

  <hr>

  <!-- Chat -->
  <h3>Chat 💬</h3>

  <input type="text" id="message" placeholder="Ton message">
  <button onclick="sendMessage()">Envoyer</button>

  <div id="chat"></div>

  <script>
    // 🔥 CONFIG FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyCsTZdce8EnHNc3za9BX6AJnfTOCqcCQf0",
      authDomain: "mi-mia.firebaseapp.com",
      projectId: "mi-mia",
      storageBucket: "mi-mia.firebasestorage.app",
      messagingSenderId: "871745901536",
      appId: "1:871745901536:web:cc3e037b967094942ed185"
    };

    // 🔥 INITIALISATION
    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.firestore();

    // 🔐 CRÉER COMPTE
    function register() {
      let email = document.getElementById("email").value;
      let password = document.getElementById("password").value;

      auth.createUserWithEmailAndPassword(email, password)
        .then(() => {
          document.getElementById("msg").innerText = "Compte créé ✅";
        })
        .catch(error => {
          document.getElementById("msg").innerText = error.message;
        });
    }

    // 🔑 CONNEXION
    function login() {
      let email = document.getElementById("email").value;
      let password = document.getElementById("password").value;

      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          document.getElementById("msg").innerText = "Connecté ✅";
        })
        .catch(error => {
          document.getElementById("msg").innerText = error.message;
        });
    }

    // 💬 ENVOYER MESSAGE
    function sendMessage() {
      let message = document.getElementById("message").value;

      const user = auth.currentUser;

      if (user) {
        db.collection("messages").add({
          text: message,
          email: user.email,
          date: new Date()
        });

        document.getElementById("message").value = "";
      } else {
        document.getElementById("msg").innerText = "Connecte-toi d'abord ❗";
      }
    }

    // 📥 AFFICHER MESSAGES
    db.collection("messages").orderBy("date", "asc")
      .onSnapshot(snapshot => {
        let html = "";

        snapshot.forEach(doc => {
          let data = doc.data();
          html += `<p><b>${data.email}:</b> ${data.text}</p>`;
        });

        document.getElementById("chat").innerHTML = html;
      });

  </script>

</body>
  </html>
