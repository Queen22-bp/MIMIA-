<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MiMia</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
}

button {
  background: #38bdf8;
}

.hidden {
  display: none;
}

.chat {
  max-width: 500px;
  margin: auto;
}

.message {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  text-align: left;
}

.me {
  background: #38bdf8;
  color: black;
}

.other {
  background: #1e293b;
}

.small {
  font-size: 12px;
  opacity: 0.7;
}
</style>

</head>
<body>

<h1>🔥 MiMia</h1>

<!-- LOGIN -->
<div id="login">
  <h2>Connexion</h2>
  <input id="username" placeholder="Nom"><br>
  <input id="avatar" placeholder="URL photo (optionnel)"><br>
  <button onclick="login()">Entrer</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <h2 id="welcome"></h2>

  <div class="chat" id="feed"></div>

  <input id="message" placeholder="Message...">
  <button onclick="poster()">Envoyer</button>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIza....",
  authDomain: "mimia-xxxx.firebaseapp.com",
  projectId: "mimia-xxxx"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let user = "";
let avatar = "";

// LOGIN
function login() {
  user = document.getElementById("username").value;
  avatar = document.getElementById("avatar").value;

  if (user === "") return;

  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  document.getElementById("welcome").innerText = "Bienvenue " + user;
}

// ENVOYER MESSAGE
function poster() {
  let msg = document.getElementById("message").value;
  if (msg === "") return;

  db.collection("messages").add({
    text: msg,
    user: user,
    avatar: avatar,
    time: Date.now()
  });

  document.getElementById("message").value = "";
}

// AFFICHER MESSAGES
db.collection("messages").orderBy("time")
.onSnapshot(snapshot => {
  let feed = document.getElementById("feed");
  feed.innerHTML = "";

  snapshot.forEach(doc => {
    let data = doc.data();

    let div = document.createElement("div");
    div.className = "message " + (data.user === user ? "me" : "other");

    let time = new Date(data.time).toLocaleTimeString();

    div.innerHTML = `
      <b>${data.user}</b> <span class="small">${time}</span><br>
      ${data.text}
    `;

    feed.appendChild(div);
  });
});
</script>

</body>
</html>
